<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Buonanotte - 睡前意大利语</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1920px;
  overflow: hidden;
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
}

#root {
  position: relative;
  width: 1080px;
  height: 1920px;
  overflow: hidden;
  background: radial-gradient(ellipse at 50% 0%, #1a1050 0%, #141845 30%, #0a0e27 70%, #050718 100%);
}

/* ========= 星光 ========= */
.stars {
  position: absolute;
  top: 0; left: 0;
  width: 1080px; height: 1920px;
  pointer-events: none;
}
.star {
  position: absolute;
  width: 3px; height: 3px;
  background: #fff;
  border-radius: 50%;
}

/* ========= 月亮 ========= */
.moon {
  position: absolute;
  top: 230px;
  right: 160px;
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #f5e6b8, #d4a843 60%, #b8860b);
  box-shadow: 0 0 60px rgba(212, 168, 67, 0.4), 0 0 120px rgba(212, 168, 67, 0.15);
  opacity: 0;
}
.moon-crater {
  position: absolute;
  border-radius: 50%;
  background: rgba(180, 140, 60, 0.3);
}
.moon-crater:nth-child(1) { width: 20px; height: 20px; top: 30px; left: 40px; }
.moon-crater:nth-child(2) { width: 12px; height: 12px; top: 55px; left: 25px; }
.moon-crater:nth-child(3) { width: 8px; height: 8px; top: 45px; left: 70px; }
.moon-crater:nth-child(4) { width: 15px; height: 15px; top: 70px; left: 50px; }

/* ========= 意大利三色条纹 ========= */
.tricolore {
  position: absolute;
  top: 0; left: 0;
  width: 1080px; height: 100%;
  display: flex;
  pointer-events: none;
  opacity: 0.04;
}
.tricolore-stripe { flex: 1; }
.tricolore-stripe.green { background: #009246; }
.tricolore-stripe.white { background: #ffffff; }
.tricolore-stripe.red   { background: #ce2b37; }

/* ========= ITALIA 水印 ========= */
.watermark {
  position: absolute;
  bottom: 100px;
  right: 120px;
  font-family: Georgia, serif;
  font-size: 120px;
  color: rgba(255, 255, 255, 0.03);
  letter-spacing: 20px;
  transform: rotate(-10deg);
  pointer-events: none;
}

/* ========= 标题 ========= */
.header {
  position: absolute;
  top: 310px;
  left: 120px;
  opacity: 0;
}
.buonanotte {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 72px;
  font-style: italic;
  color: #d4a843;
  text-shadow: 0 0 30px rgba(212, 168, 67, 0.3);
  letter-spacing: 4px;
}
.title-cn {
  font-size: 26px;
  color: rgba(255, 255, 255, 0.6);
  margin-top: 8px;
  letter-spacing: 6px;
}
.subtitle-line {
  width: 80px;
  height: 2px;
  background: linear-gradient(90deg, #d4a843, transparent);
  margin-top: 12px;
}

/* ========= 句子卡片 ========= */
.cards-container {
  position: absolute;
  top: 530px;
  left: 130px;
  width: 820px;
  height: 840px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
.card {
  position: relative;
  padding: 10px 24px;
  border-radius: 16px;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.06);
  backdrop-filter: blur(10px);
  opacity: 0;
  transform: translateX(-40px);
  transition: border-color 0.4s ease, box-shadow 0.4s ease, background 0.4s ease;
}
.card.active {
  border-color: rgba(212, 168, 67, 0.8) !important;
  background: rgba(212, 168, 67, 0.08) !important;
  box-shadow: 0 0 30px rgba(212, 168, 67, 0.15), inset 0 0 30px rgba(212, 168, 67, 0.05) !important;
}
.card.done {
  border-color: rgba(100, 200, 100, 0.3);
  background: rgba(100, 200, 100, 0.03);
}
.card-number {
  position: absolute;
  top: 14px;
  left: 14px;
  font-size: 25px;
  color: rgba(255, 255, 255, 0.2);
  font-family: Georgia, serif;
}
.card-italian {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 60px;
  color: #f0d080;
  line-height: 1.4;
  margin-bottom: 4px;
  padding-left: 24px;
}
.card-chinese {
  font-size: 35px;
  color: rgba(255, 255, 255, 0.65);
  line-height: 1.4;
  padding-left: 24px;
}
.card.active .card-italian {
  color: #f5d890;
  text-shadow: 0 0 20px rgba(212, 168, 67, 0.3);
}
.card.active .card-chinese {
  color: rgba(255, 255, 255, 0.85);
}

/* ========= 品牌名 ========= */
.brand {
  position: absolute;
  top: 1470px;
  left: 0;
  width: 1080px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  font-size: 48px;
  color: rgba(255, 255, 255, 0.12);
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  letter-spacing: 18px;
  pointer-events: none;
}
.brand-logo {
  width: 60px;
  height: 60px;
  object-fit: cover;
  border-radius: 8px;
  opacity: 0.5;
}

/* ========= 进度条 ========= */
.progress-container {
  position: absolute;
  bottom: 290px;
  left: 120px;
  width: 840px;
  opacity: 0;
}
.progress-label {
  display: flex;
  justify-content: space-between;
  font-size: 14px;
  color: rgba(255, 255, 255, 0.3);
  margin-bottom: 8px;
}
.progress-bar-bg {
  width: 100%;
  height: 4px;
  background: rgba(255, 255, 255, 0.08);
  border-radius: 2px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #d4a843, #f0d080);
  border-radius: 2px;
}

/* ========= 分页圆点 ========= */
.pagination {
  position: absolute;
  bottom: 220px;
  left: 120px;
  width: 840px;
  display: flex;
  justify-content: center;
  gap: 12px;
  opacity: 0;
}
.dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.1);
  border: 1px solid rgba(255, 255, 255, 0.15);
  transition: all 0.4s;
}
.dot.active {
  background: #d4a843;
  box-shadow: 0 0 12px rgba(212, 168, 67, 0.5);
  border-color: #d4a843;
  transform: scale(1.3);
}
.dot.done {
  background: rgba(100, 200, 100, 0.4);
  border-color: rgba(100, 200, 100, 0.3);
}

/* ========= 底部 ========= */
.footer {
  position: absolute;
  bottom: 80px;
  left: 120px;
  width: 840px;
  text-align: center;
}
.footer-text {
  font-size: 14px;
  color: rgba(255, 255, 255, 0.15);
  font-family: Georgia, serif;
  font-style: italic;
  letter-spacing: 2px;
}

.floating-element {
  position: absolute;
  font-size: 24px;
  pointer-events: none;
  opacity: 0.15;
}

audio { display: none; }
</style>
</head>
<body>
<div id="root">
  <!-- 三色背景 -->
  <div class="tricolore">
    <div class="tricolore-stripe green"></div>
    <div class="tricolore-stripe white"></div>
    <div class="tricolore-stripe red"></div>
  </div>

  <!-- 星光 -->
  <div id="stars" class="stars"></div>

  <!-- 月亮 -->
  <div id="moon" class="moon">
    <div class="moon-crater"></div>
    <div class="moon-crater"></div>
    <div class="moon-crater"></div>
    <div class="moon-crater"></div>
  </div>

  <!-- ITALIA 水印 -->
  <div class="watermark">ITALIANO</div>

  <!-- 标题 -->
  <div id="header" class="header">
    <div class="buonanotte">Buonanotte</div>
    <div class="title-cn">睡 前 意 大 利 语</div>
    <div class="subtitle-line"></div>
  </div>

  <!-- 句子卡片 -->
  <div id="cards" class="cards-container">
    <div class="card" data-sentence="0">
      <span class="card-number">01</span>
      <div class="card-italian">Lieto di conoscerti.</div>
      <div class="card-chinese">很高兴认识你。（男性说）</div>
    </div>
    <div class="card" data-sentence="1">
      <span class="card-number">02</span>
      <div class="card-italian">Che Vergogna!</div>
      <div class="card-chinese">真丢脸！</div>
    </div>
    <div class="card" data-sentence="2">
      <span class="card-number">03</span>
      <div class="card-italian">Quanto costa?</div>
      <div class="card-chinese">多少钱？</div>
    </div>
    <div class="card" data-sentence="3">
      <span class="card-number">04</span>
      <div class="card-italian">Mi dispiace.</div>
      <div class="card-chinese">对不起。</div>
    </div>
    <div class="card" data-sentence="4">
      <span class="card-number">05</span>
      <div class="card-italian">È tardi.</div>
      <div class="card-chinese">晚了。</div>
    </div>
  </div>

  <!-- 品牌名 -->
  <div class="brand">
    <img class="brand-logo" src="media/logo-piano.jpg" alt="logo">
    <span>涛子办事处</span>
  </div>

  <!-- 进度条 -->
  <div id="progress" class="progress-container">
    <div class="progress-label">
      <span>Buonanotte</span>
      <span id="progressText">0 / 5</span>
    </div>
    <div class="progress-bar-bg">
      <div id="progressBar" class="progress-bar-fill"></div>
    </div>
  </div>

  <!-- 分页圆点 -->
  <div id="pagination" class="pagination">
    <div class="dot" data-dot="0"></div>
    <div class="dot" data-dot="1"></div>
    <div class="dot" data-dot="2"></div>
    <div class="dot" data-dot="3"></div>
    <div class="dot" data-dot="4"></div>
  </div>

  <!-- 底部 -->
  <div class="footer">
    <div class="footer-text">Dolce far niente &bull; 享受无所事事的快乐</div>
  </div>
  <div class="floating-element" style="bottom:50px;left:140px;">🇮🇹</div>
  <div class="floating-element" style="bottom:50px;right:140px;">🌙</div>

  <!-- ===== 音频 ===== -->
  <!-- 句1 -->
  <audio id="audio-0" src="media/seg_0000.mp3" preload="auto"></audio>
  <audio id="audio-1" src="media/seg_0001.mp3" preload="auto"></audio>
  <audio id="audio-2" src="media/seg_0002.mp3" preload="auto"></audio>
  <!-- 句2 -->
  <audio id="audio-3" src="media/seg_0003.mp3" preload="auto"></audio>
  <audio id="audio-4" src="media/seg_0004.mp3" preload="auto"></audio>
  <audio id="audio-5" src="media/seg_0005.mp3" preload="auto"></audio>
  <!-- 句3 -->
  <audio id="audio-6" src="media/seg_0006.mp3" preload="auto"></audio>
  <audio id="audio-7" src="media/seg_0007.mp3" preload="auto"></audio>
  <audio id="audio-8" src="media/seg_0008.mp3" preload="auto"></audio>
  <!-- 句4 -->
  <audio id="audio-9" src="media/seg_0009.mp3" preload="auto"></audio>
  <audio id="audio-10" src="media/seg_0010.mp3" preload="auto"></audio>
  <audio id="audio-11" src="media/seg_0011.mp3" preload="auto"></audio>
  <!-- 句5 -->
  <audio id="audio-12" src="media/seg_0012.mp3" preload="auto"></audio>
  <audio id="audio-13" src="media/seg_0013.mp3" preload="auto"></audio>
  <audio id="audio-14" src="media/seg_0014.mp3" preload="auto"></audio>
</div>

<script>
(function() {
  'use strict';

  // 生成星光
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random() * 1080 + 'px';
    s.style.top = Math.random() * 1920 + 'px';
    const sz = 1 + Math.random() * 3;
    s.style.width = sz + 'px';
    s.style.height = sz + 'px';
    s.style.opacity = 0.1 + Math.random() * 0.4;
    starsEl.appendChild(s);
  }

  // ===== 实际音频时长（从 timing.json 获取） =====
  const DURATIONS = [
    1.800, 3.312, 2.640,  // 句1: 意快, 中文, 意慢
    1.176, 1.440, 1.704,  // 句2
    1.224, 1.440, 1.800,  // 句3
    1.392, 1.368, 2.016,  // 句4
    1.032, 1.200, 1.488   // 句5
  ];
  const GAP = 0.3;
  const GAP_SENTENCE = 2.0;
  const INTRO_DUR = 2.0;
  const TOTAL_SEGMENTS = 15;
  const SENTENCES = 5;

  // ===== 计算每段起止时间 =====
  const segments = [];
  let cursor = 0;
  for (let i = 0; i < TOTAL_SEGMENTS; i++) {
    const sentIdx = Math.floor(i / 3);
    const isLastInSentence = (i % 3 === 2);
    segments.push({
      segIdx: i,
      sentIdx: sentIdx,
      start: cursor,
      duration: DURATIONS[i],
      end: cursor + DURATIONS[i]
    });
    cursor += DURATIONS[i] + (isLastInSentence && i < TOTAL_SEGMENTS - 1 ? GAP_SENTENCE : GAP);
  }
  const TOTAL_DUR = cursor;

  // ===== 辅助函数 =====
  function playAudio(idx) {
    const el = document.getElementById('audio-' + idx);
    if (el) {
      el.volume = 1.0;
      el.currentTime = 0;
      el.play().catch(function(){});
    }
  }
  function stopAudio(idx) {
    const el = document.getElementById('audio-' + idx);
    if (el) { el.pause(); el.currentTime = 0; }
  }

  function highlight(sentIdx) {
    var cards = document.querySelectorAll('.card');
    var dots = document.querySelectorAll('.dot');
    cards.forEach(function(c, i) {
      c.classList.remove('active', 'done');
      if (i < sentIdx) c.classList.add('done');
    });
    dots.forEach(function(d, i) {
      d.classList.remove('active', 'done');
      if (i < sentIdx) d.classList.add('done');
    });
    if (sentIdx >= 0 && sentIdx < SENTENCES) {
      cards[sentIdx].classList.add('active');
      dots[sentIdx].classList.add('active');
    }
    var pt = document.getElementById('progressText');
    pt.textContent = sentIdx >= SENTENCES ? '5 / 5' : sentIdx + ' / 5';
    if (sentIdx >= SENTENCES) {
      cards.forEach(function(c) { c.classList.remove('active'); c.classList.add('done'); });
      dots.forEach(function(d) { d.classList.remove('active'); d.classList.add('done'); });
    }
  }

  // ===== 预加载所有音频 =====
  function preloadAll() {
    return new Promise(function(resolve) {
      var audioEls = [];
      for (var i = 0; i < TOTAL_SEGMENTS; i++) {
        audioEls.push(document.getElementById('audio-' + i));
      }
      var loaded = 0;
      function check() { loaded++; if (loaded >= TOTAL_SEGMENTS) resolve(); }

      audioEls.forEach(function(el) {
        if (!el) { check(); return; }
        if (el.readyState >= 3) { check(); return; } // HAVE_FUTURE_DATA
        el.addEventListener('canplaythrough', check, { once: true });
        el.addEventListener('error', check, { once: true });
        el.load();
      });
      // 超时保底：最多等 5 秒
      setTimeout(resolve, 5000);
    });
  }

  // ===== 构建 GSAP 时间线 =====
  var tl = gsap.timeline({ paused: true });

  tl.set('.moon', { opacity: 0, scale: 0.5 });
  tl.set('#header', { opacity: 0, y: -30 });
  tl.set('.card', { opacity: 0, x: -40 });
  tl.set('#progress', { opacity: 0, y: 20 });
  tl.set('#pagination', { opacity: 0, y: 20 });

  // 1. 开场 (0s - 2s)
  tl.to('#header', { opacity: 1, y: 0, duration: 0.8, ease: 'power2.out' }, 0);
  tl.to('.moon', { opacity: 0.6, scale: 1, duration: 1.0, ease: 'power2.out' }, 0.3);
  tl.to('.card', { opacity: 1, x: 0, duration: 0.5, stagger: 0.06, ease: 'power2.out' }, 0.8);
  tl.to(['#progress', '#pagination'], { opacity: 1, y: 0, duration: 0.5 }, 1.5);

  // 2. 逐段播放
  var lastSent = -1;
  for (var i = 0; i < segments.length; i++) {
    var seg = segments[i];
    var t = INTRO_DUR + seg.start;

    if (seg.sentIdx !== lastSent) {
      lastSent = seg.sentIdx;
      tl.call(highlight.bind(null, seg.sentIdx), [], t);
    }

    tl.call(playAudio.bind(null, seg.segIdx), [], t);
    tl.call(stopAudio.bind(null, seg.segIdx), [], t + seg.duration);
  }

  // 3. 全部完成
  var finishTime = INTRO_DUR + TOTAL_DUR;
  tl.call(highlight.bind(null, SENTENCES), [], finishTime);

  // 4. 淡出
  tl.to('#root', { opacity: 0, duration: 1.5 }, finishTime + 0.5);

  // 5. 进度条
  var progressEnd = finishTime + 1.2;
  tl.to('#progressBar', { width: '100%', duration: progressEnd - INTRO_DUR, ease: 'none' }, INTRO_DUR);

  // 注册
  window.__timelines = window.__timelines || {};
  window.__timelines['root'] = tl;
  document.getElementById('root').setAttribute('data-duration', Math.ceil(INTRO_DUR + TOTAL_DUR + 2));

  window.totalDuration = progressEnd + 2.0;

  // ===== 渲染用：根据时间直接计算并应用高亮状态 =====
  window.resetHighlights = function() {
    document.querySelectorAll('.card').forEach(function(c) { c.classList.remove('active', 'done'); });
    document.querySelectorAll('.dot').forEach(function(d) { d.classList.remove('active', 'done'); });
  };
  window.computeHighlight = function(t) {
    // t 是 GSAP timeline 上的绝对时间
    var audioTime = t - INTRO_DUR;
    if (audioTime < 0) return -1; // 开场期间，不高亮任何句子
    // 找到当前时间对应的句子
    for (var i = segments.length - 1; i >= 0; i--) {
      if (audioTime >= segments[i].start) return segments[i].sentIdx;
    }
    return -1;
  };
  // 暴露 highlight 供渲染脚本调用
  window.highlightFn = highlight;

  // 预加载完成后播放
  preloadAll().then(function() {
    console.log('Audio ready, starting timeline');
    tl.play();
  });
})();
</script>
</body>
</html>
